<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8c4d4"/>
      <stop offset="1" stop-color="#d9e4ea"/>
    </linearGradient>
    <linearGradient id="concrete" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c3c3bd"/>
      <stop offset="1" stop-color="#a8a8a1"/>
    </linearGradient>
  </defs>

  <!-- sky + ground -->
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect y="700" width="1600" height="200" fill="#b3a48c"/>
  <rect y="700" width="1600" height="14" fill="#9c8e77"/>

  <!-- rubble -->
  <ellipse cx="300" cy="770" rx="90" ry="16" fill="#a2937a"/>
  <ellipse cx="1330" cy="800" rx="120" ry="20" fill="#a2937a"/>
  <circle cx="280" cy="756" r="14" fill="#8f826d"/>
  <circle cx="320" cy="760" r="10" fill="#96896f"/>
  <circle cx="1310" cy="786" r="14" fill="#8f826d"/>

  <!-- main volume -->
  <rect x="520" y="240" width="560" height="460" fill="url(#concrete)"/>
  <rect x="520" y="240" width="560" height="18" fill="#8f8f89"/>
  <!-- left wing -->
  <rect x="330" y="420" width="190" height="280" fill="#b5b5ae"/>
  <rect x="330" y="420" width="190" height="14" fill="#8f8f89"/>
  <!-- right wing -->
  <rect x="1080" y="380" width="220" height="320" fill="#adada6"/>
  <rect x="1080" y="380" width="220" height="14" fill="#8f8f89"/>

  <!-- bare window openings -->
  <rect x="570" y="300" width="130" height="110" fill="#6f7574"/>
  <rect x="760" y="300" width="130" height="110" fill="#6f7574"/>
  <rect x="950" y="300" width="90" height="110" fill="#6f7574"/>
  <rect x="570" y="470" width="130" height="120" fill="#7a807f"/>
  <rect x="950" y="470" width="90" height="120" fill="#7a807f"/>
  <!-- door opening -->
  <rect x="760" y="480" width="130" height="220" fill="#5d6362"/>
  <!-- wing openings -->
  <rect x="370" y="470" width="100" height="90" fill="#6f7574"/>
  <rect x="1120" y="430" width="140" height="100" fill="#6f7574"/>

  <!-- form-work joints -->
  <g stroke="#9a9a93" stroke-width="3" opacity="0.7">
    <line x1="520" y1="360" x2="1080" y2="360"/>
    <line x1="520" y1="450" x2="1080" y2="450"/>
    <line x1="520" y1="620" x2="1080" y2="620"/>
    <line x1="700" y1="240" x2="700" y2="700"/>
    <line x1="930" y1="240" x2="930" y2="700"/>
  </g>
  <g fill="#8c8c85" opacity="0.55">
    <circle cx="560" cy="400" r="4"/><circle cx="660" cy="400" r="4"/><circle cx="860" cy="400" r="4"/>
    <circle cx="1000" cy="640" r="4"/><circle cx="600" cy="640" r="4"/>
  </g>

  <!-- bare tree -->
  <g stroke="#6d6155" stroke-width="10" stroke-linecap="round" fill="none">
    <path d="M170 700 V520"/>
    <path d="M170 560 130 500"/>
    <path d="M170 590 215 520"/>
    <path d="M130 500 110 460"/>
    <path d="M215 520 240 470"/>
  </g>
</svg>
