    else if(NEXT_URL){ window.location.assign(NEXT_URL); }
  }
  function update(){
    raf=0;
    var p=frac();
    var q=Math.min(1,Math.max(0,(p-.94)/.06)); /* letzte 6% weich ausblenden */
    cover.style.opacity=String(q);
    cover.style.visibility=q<=.001?"hidden":"visible";
    if(p>=.999 && !fired){ fired=true; cover.style.opacity="1"; cover.style.visibility="visible"; setTimeout(go,300); }
  }
  function onScroll(){ raf||(raf=requestAnimationFrame(update)); }
  update();
  window.addEventListener("scroll",onScroll,{passive:true});
  window.addEventListener("resize",onScroll);
})();
</script>
</body>
