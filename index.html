<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vorher/Nachher Schieberegler</title>
<style>
  /* ===== Vorher/Nachher-Schieberegler ===== */
  .compare {
    position: relative;
    overflow: hidden;
    border-radius: 14px;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    background: #dfe5e2;
    box-shadow: 0 8px 28px rgba(16, 26, 46, 0.15);
    max-width: 980px;
    margin: 40px auto;
    cursor: ew-resize;
  }
  .compare img {
    display: block;
    width: 100%;
    height: auto;
    pointer-events: none;
  }
  .compare .after {
    position: absolute;
    inset: 0;
    clip-path: inset(0 0 0 50%);
  }
  .compare .handle {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    z-index: 2;
    width: 3px;
    background: #fff;
    transform: translateX(-50%);
    box-shadow: 0 0 8px rgba(0, 0, 0, 0.35);
  }
  .compare .knob {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: #166534;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    border: 3px solid #fff;
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
  }
</style>
</head>
<body>

<!-- ============================================================
     HIER DIE EIGENEN BILDER EINTRAGEN:
     - src="before.jpg"  →  das VORHER-Bild
     - src="after.jpg"   →  das NACHHER-Bild
     Beide Bilder sollten das gleiche Seitenverhältnis haben.
     ============================================================ -->
<div class="compare">
  <img src="before.jpg" alt="Vorher" />
  <div class="after">
    <img src="after.jpg" alt="Nachher" />
  </div>
  <div class="handle"><span class="knob">&#8596;</span></div>
</div>

<script>
  // Macht jeden .compare-Container zum ziehbaren Vorher/Nachher-Regler.
  document.querySelectorAll(".compare").forEach(function (box) {
    var after = box.querySelector(".after");
    var handle = box.querySelector(".handle");
    var dragging = false;

    function setPos(clientX) {
      var r = box.getBoundingClientRect();
      var pct = Math.max(0, Math.min(100, ((clientX - r.left) / r.width) * 100));
      after.style.clipPath = "inset(0 0 0 " + pct + "%)";
      handle.style.left = pct + "%";
    }

    box.addEventListener("pointerdown", function (e) {
      dragging = true;
      box.setPointerCapture(e.pointerId);
      setPos(e.clientX);
    });
    box.addEventListener("pointermove", function (e) {
      if (dragging) setPos(e.clientX);
    });
    ["pointerup", "pointercancel"].forEach(function (ev) {
      box.addEventListener(ev, function () { dragging = false; });
    });
  });
</script>

</body>
</html>
