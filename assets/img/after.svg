<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5b26b"/>
      <stop offset="0.55" stop-color="#f7d8ae"/>
      <stop offset="1" stop-color="#fbeedd"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd98a"/>
      <stop offset="1" stop-color="#e8933f"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b07a45"/>
      <stop offset="1" stop-color="#8f5f33"/>
    </linearGradient>
  </defs>

  <!-- sky + lawn -->
  <rect width="1600" height="900" fill="url(#sky2)"/>
  <circle cx="1380" cy="180" r="60" fill="#ffe9b8" opacity="0.9"/>
  <rect y="700" width="1600" height="200" fill="#7fa869"/>
  <rect y="700" width="1600" height="14" fill="#6d955a"/>

  <!-- walkway -->
  <polygon points="740,900 910,900 880,714 770,714" fill="#d8d3c8"/>
  <line x1="800" y1="900" x2="812" y2="714" stroke="#c2bcae" stroke-width="4"/>
  <line x1="852" y1="900" x2="846" y2="714" stroke="#c2bcae" stroke-width="4"/>

  <!-- main volume: white render -->
  <rect x="520" y="240" width="560" height="460" fill="#f4f1ea"/>
  <rect x="500" y="218" width="600" height="30" rx="6" fill="#2e3438"/>
  <!-- charcoal feature band -->
  <rect x="930" y="240" width="150" height="460" fill="#3a4247"/>
  <!-- left wing: wood slats -->
  <rect x="330" y="420" width="190" height="280" fill="url(#wood)"/>
  <g stroke="#7c5028" stroke-width="3" opacity="0.6">
    <line x1="352" y1="420" x2="352" y2="700"/><line x1="380" y1="420" x2="380" y2="700"/>
    <line x1="408" y1="420" x2="408" y2="700"/><line x1="436" y1="420" x2="436" y2="700"/>
    <line x1="464" y1="420" x2="464" y2="700"/><line x1="492" y1="420" x2="492" y2="700"/>
  </g>
  <rect x="318" y="400" width="214" height="24" rx="5" fill="#2e3438"/>
  <!-- right wing: white with roof deck -->
  <rect x="1080" y="380" width="220" height="320" fill="#efece4"/>
  <rect x="1066" y="358" width="248" height="26" rx="5" fill="#2e3438"/>
  <g stroke="#3a4247" stroke-width="4">
    <line x1="1080" y1="392" x2="1300" y2="392"/>
    <line x1="1096" y1="358" x2="1096" y2="392"/><line x1="1140" y1="358" x2="1140" y2="392"/>
    <line x1="1184" y1="358" x2="1184" y2="392"/><line x1="1228" y1="358" x2="1228" y2="392"/>
    <line x1="1272" y1="358" x2="1272" y2="392"/>
  </g>

  <!-- glowing windows, dark frames -->
  <g stroke="#2e3438" stroke-width="8">
    <rect x="570" y="300" width="130" height="110" fill="url(#glass)"/>
    <rect x="760" y="300" width="130" height="110" fill="url(#glass)"/>
    <rect x="950" y="300" width="90" height="110" fill="url(#glass)"/>
    <rect x="570" y="470" width="130" height="120" fill="url(#glass)"/>
    <rect x="950" y="470" width="90" height="120" fill="url(#glass)"/>
    <rect x="370" y="470" width="100" height="90" fill="url(#glass)"/>
    <rect x="1120" y="430" width="140" height="100" fill="url(#glass)"/>
  </g>
  <g stroke="#2e3438" stroke-width="4" opacity="0.85">
    <line x1="635" y1="300" x2="635" y2="410"/>
    <line x1="825" y1="300" x2="825" y2="410"/>
    <line x1="635" y1="470" x2="635" y2="590"/>
    <line x1="1190" y1="430" x2="1190" y2="530"/>
  </g>

  <!-- wood entry door with glow -->
  <rect x="760" y="480" width="130" height="220" fill="url(#wood)" stroke="#2e3438" stroke-width="8"/>
  <circle cx="872" cy="596" r="7" fill="#ffd98a"/>
  <rect x="742" y="464" width="166" height="16" rx="4" fill="#2e3438"/>

  <!-- planters + hedge -->
  <g>
    <rect x="540" y="640" width="200" height="60" rx="6" fill="#3a4247"/>
    <ellipse cx="580" cy="636" rx="34" ry="20" fill="#4f7d43"/>
    <ellipse cx="640" cy="630" rx="40" ry="24" fill="#5b8c4d"/>
    <ellipse cx="700" cy="636" rx="34" ry="20" fill="#4f7d43"/>
  </g>
  <g>
    <ellipse cx="1130" cy="690" rx="46" ry="30" fill="#557f47"/>
    <ellipse cx="1210" cy="694" rx="52" ry="34" fill="#618f52"/>
    <ellipse cx="1285" cy="690" rx="44" ry="28" fill="#557f47"/>
  </g>

  <!-- leafy tree -->
  <g>
    <path d="M170 700 V540" stroke="#6d5033" stroke-width="12" stroke-linecap="round"/>
    <circle cx="150" cy="500" r="58" fill="#5b8c4d"/>
    <circle cx="215" cy="480" r="48" fill="#679a58"/>
    <circle cx="180" cy="430" r="44" fill="#74a862"/>
  </g>

  <!-- path lights -->
  <g>
    <rect x="720" y="740" width="8" height="40" fill="#2e3438"/>
    <circle cx="724" cy="734" r="10" fill="#ffd98a"/>
    <rect x="900" y="760" width="8" height="40" fill="#2e3438"/>
    <circle cx="904" cy="754" r="10" fill="#ffd98a"/>
  </g>
</svg>
